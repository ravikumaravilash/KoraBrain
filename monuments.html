<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>KORA Monuments</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fafafa;
    }
    header {
      background: #4facfe;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .menu-icon {
      font-size: 20px;
      cursor: pointer;
    }
    #list div {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #00c6fb;
    }
  </style>
</head>
<body>
  <header>
    <h1>Monuments</h1>
    <div class="menu-icon" onclick="location.href='home.html'">🏠 Home</div>
  </header>

  <button onclick="loadMonuments()">Load Monuments</button>
  <input type="text" id="searchBox" placeholder="Search by name or location" onkeyup="searchMonuments()">
  <button onclick="sortByName()">Sort by Name</button>
  <button onclick="sortByLocation()">Sort by Location</button>

  <div id="list"></div>

  <hr>

  <h2>Add a Monument</h2>
  <form id="monumentForm">
    <label>Name: <input type="text" id="name"></label><br>
    <label>Location: <input type="text" id="location"></label><br>
    <label>Built By: <input type="text" id="builtBy"></label><br>
    <label>Year Built: <input type="text" id="yearBuilt"></label><br>
    <label>Etiquette (comma separated): <input type="text" id="etiquette"></label><br>
    <label>Stories (comma separated): <input type="text" id="stories"></label><br>
    <label>Food (comma separated): <input type="text" id="food"></label><br>
    <button type="submit">Add Monument</button>
  </form>

  <script>
    let monumentsCache = [];

    async function loadMonuments() {
      const res = await fetch('/monuments');
      const data = await res.json();
      monumentsCache = data;
      renderMonuments(data);
    }

   function renderMonuments(monuments) {
  document.getElementById('list').innerHTML =
    monuments.map((m, index) => {
      const shortStory = m.stories && m.stories.length > 0 ? m.stories[0] : 'N/A';
      const extraStories = m.stories && m.stories.length > 1 ? m.stories.slice(1).join('<br>') : '';
      const storyId = `story-${index}`;

      return `
        <div>
          <h3>${m.name} (${m.location})</h3>
          ${m.imageUrl ? `<img src="${m.imageUrl}" alt="${m.name}" style="width:100%;max-width:400px;border-radius:8px;">` : ''}
          <p><strong>Built By:</strong> ${m.builtBy || 'Unknown'}</p>
          <p><strong>Year Built:</strong> ${m.yearBuilt || 'Unknown'}</p>
          <p><strong>Stories:</strong> ${shortStory}
            ${extraStories ? `<span id="${storyId}" style="display:none;"><br>${extraStories}</span>` : ''}
            ${extraStories ? `<button onclick="toggleStory('${storyId}')">Read More</button>` : ''}
          </p>
          <p><strong>Etiquette:</strong> ${m.etiquette ? m.etiquette.join(', ') : 'N/A'}</p>
          <p><strong>Food:</strong> ${m.food ? m.food.join(', ') : 'N/A'}</p>
          <button onclick="deleteMonument('${m._id}')">Delete</button>
          <button onclick="updateMonument('${m._id}')">Update</button>
        </div>
      `;
    }).join('');
}


function toggleStory(id) {
  const el = document.getElementById(id);
  if (el.style.display === 'none') {
    el.style.display = 'inline';
  } else {
    el.style.display = 'none';
  }
}

    function searchMonuments() {
      const query = document.getElementById('searchBox').value.toLowerCase();
      const filtered = monumentsCache.filter(m =>
        m.name.toLowerCase().includes(query) ||
        m.location.toLowerCase().includes(query)
      );
      renderMonuments(filtered);
    }

    function sortByName() {
      const sorted = [...monumentsCache].sort((a, b) => a.name.localeCompare(b.name));
      renderMonuments(sorted);
    }

    function sortByLocation() {
      const sorted = [...monumentsCache].sort((a, b) => a.location.localeCompare(b.location));
      renderMonuments(sorted);
    }

    document.getElementById('monumentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const monument = {
        name: document.getElementById('name').value,
        location: document.getElementById('location').value,
        builtBy: document.getElementById('builtBy').value,
        yearBuilt: document.getElementById('yearBuilt').value,
        etiquette: document.getElementById('etiquette').value.split(',').map(s => s.trim()),
        stories: document.getElementById('stories').value.split(',').map(s => s.trim()),
        food: document.getElementById('food').value.split(',').map(s => s.trim())
      };

      const res = await fetch('/monuments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(monument)
      });

      const data = await res.json();
      alert('Monument added: ' + data.name);
      loadMonuments();
    });

    async function deleteMonument(id) {
      if (!confirm("Are you sure you want to delete this monument?")) return;
      const res = await fetch('/monuments/' + id, { method: 'DELETE' });
      const data = await res.json();
      alert(data.message);
      loadMonuments();
    }

    async function updateMonument(id) {
      const newName = prompt("Enter new name:");
      const newLocation = prompt("Enter new location:");
      const newBuiltBy = prompt("Enter builder:");
      const newYearBuilt = prompt("Enter year built:");
      if (!newName || !newLocation) return;

      const res = await fetch('/monuments/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: newName,
          location: newLocation,
          builtBy: newBuiltBy,
          yearBuilt: newYearBuilt
        })
      });

      const data = await res.json();
      alert("Updated: " + data.name);
      loadMonuments();
    }
  </script>
</body>
</html>
